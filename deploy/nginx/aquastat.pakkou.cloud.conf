server {
    server_name aquastat.pakkou.cloud;

    # ── API — Express container on host port 5510 ───────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:5510;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_read_timeout 60s;
    }

    # Direct API health probe (without going through SPA fallback)
    location = /healthz/api {
        proxy_pass http://127.0.0.1:5510/healthz;
    }

    # ── Frontend SPA (Vite/nginx container) on host port 5501 ───────────
    location / {
        proxy_pass http://127.0.0.1:5501;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_read_timeout 60s;
    }

    # Host nginx self-health
    location = /nginx-status {
        return 200 "host-nginx-ok\n";
        add_header Content-Type text/plain;
    }

    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/aquastat.pakkou.cloud/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/aquastat.pakkou.cloud/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = aquastat.pakkou.cloud) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name aquastat.pakkou.cloud;
    return 404; # managed by Certbot
}
